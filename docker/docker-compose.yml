services:
  app:
    image: ${DOCKER_IMAGE:-app:latest}
    container_name: ${APP_NAME:-app}-app
    ports:
      - "8080:8080"
    volumes:
      - ${LOG_PATH:-./log}:/log # container path : host path
      - ${DEST_DIR:-.}/config:/app/config
    environment:
      - TZ=Asia/Seoul
    restart: unless-stopped
